version: '3.8'

services:
  api:
    build: .
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/nextora
      - JWT_ACCESS_SECRET=nextora_access_token_secret_key_2026_super_secure
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_SECRET=nextora_refresh_token_secret_key_2026_super_secure
      - JWT_REFRESH_EXPIRY=7d
    depends_on:
      - mongo

  mongo:
    image: mongo:6.0
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
